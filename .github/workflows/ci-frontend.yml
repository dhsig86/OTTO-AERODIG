name: CI Frontend

on:
  push:
    branches: [main]
    paths:
      - 'aerodig-frontend/**'
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    paths:
      - 'aerodig-frontend/**'
      - '.github/workflows/ci-frontend.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aerodig-frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: aerodig-frontend/package-lock.json
      - name: Install dependencies
        run: npm ci || npm install
      - name: Type-check
        run: npm run typecheck
      - name: Run tests
        run: npm run test:run
      - name: Build
        run: npm run build
