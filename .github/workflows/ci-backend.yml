name: CI Backend

on:
  push:
    branches: [main]
    paths:
      - 'aerodig-backend/**'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    paths:
      - 'aerodig-backend/**'
      - '.github/workflows/ci-backend.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aerodig-backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: aerodig-backend/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint with ruff
        run: ruff check . || true
      - name: Run tests
        env:
          USE_LOCAL_SEEDS: 'true'
        run: pytest -q --cov=. --cov-report=term-missing
